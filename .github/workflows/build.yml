name: Build Plugin (gRPC)
on:
  push:
    branches: [ "**" ]
  workflow_dispatch:
jobs:
  build-windows-grpc:
    runs-on: windows-2022
    timeout-minutes: 360
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Cache OBS Studio dependencies
        uses: actions/cache@v4
        with:
          key: "obs-studio-30.0.0-${{ runner.os }}-grpc-v3"
          path: CI\grpc\CI_build\build_deps\obs-studio
      - name: Cache vcpkg/gRPC build
        uses: actions/cache@v4
        with:
          key: "vcpkg-grpc-1.51-${{ runner.os }}-v3"
          path: |
            CI\grpc\CI_build\build_deps\vcpkg
            CI\grpc\CI_build\build_deps\googleapis
      - name: Pre-download 7zip 21.07 from SourceForge mirror
        shell: pwsh
        working-directory: CI\grpc
        run: |
          $downloadsDir = "CI_build\build_deps\vcpkg\downloads"
          New-Item -ItemType Directory -Force -Path $downloadsDir | Out-Null
          $target = Join-Path $downloadsDir "7z2107-extra.7z"
          if (-not (Test-Path $target)) {
            Write-Host "Downloading 7zip 21.07 from SourceForge..."
            $url = "https://downloads.sourceforge.net/project/sevenzip/7-Zip/21.07/7z2107-extra.7z"
            Invoke-WebRequest -Uri $url -OutFile $target -UserAgent "Mozilla/5.0"
            Write-Host "Downloaded successfully:"
            Get-Item $target | Select-Object Name,Length
          } else {
            Write-Host "7zip already present (from cache)"
          }
      - name: Build plugin
        shell: cmd
        working-directory: CI\grpc
        env:
          CLEAN_OBS: 0
          CLEAN_VCPKG: 0
        run: python win_install_script.py
      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Closed_Captions_Plugin_Windows_gRPC_PATCHED
          path: CI\grpc\CI_build\release\
          if-no-files-found: warn
          retention-days: 90
      - name: Upload build logs on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-logs
          path: |
            CI\grpc\CI_build\build\**\*.log
            CI\grpc\CI_build\build_deps\vcpkg\buildtrees\**\*.log
          retention-days: 30
