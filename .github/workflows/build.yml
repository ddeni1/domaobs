name: Build Plugin (gRPC)
on:
  push:
    branches: [ "**" ]
  workflow_dispatch:
jobs:
  build-windows-grpc:
    runs-on: windows-2022
    timeout-minutes: 360
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Cache OBS Studio dependencies
        uses: actions/cache@v4
        with:
          key: "obs-studio-30.0.0-${{ runner.os }}-grpc-v5"
          path: CI\grpc\CI_build\build_deps\obs-studio
      - name: Cache vcpkg/gRPC build
        uses: actions/cache@v4
        with:
          key: "vcpkg-grpc-1.51-${{ runner.os }}-v5"
          path: |
            CI\grpc\CI_build\build_deps\vcpkg
            CI\grpc\CI_build\build_deps\googleapis
      - name: Install 7-Zip via Chocolatey
        shell: pwsh
        run: |
          Write-Host "Checking 7-Zip..."
          $7zPath = "C:\Program Files\7-Zip\7z.exe"
          if (Test-Path $7zPath) {
            Write-Host "7-Zip already installed at $7zPath"
          } else {
            Write-Host "Installing 7-Zip via Chocolatey..."
            choco install 7zip -y --no-progress
          }
          & $7zPath | Select-Object -First 3
      - name: Patch vcpkg to use system 7-Zip
        shell: pwsh
        working-directory: CI\grpc
        run: |
          $vcpkgDir = "CI_build\build_deps\vcpkg"
          New-Item -ItemType Directory -Force -Path $vcpkgDir | Out-Null
          New-Item -ItemType Directory -Force -Path "$vcpkgDir\downloads\tools\7zip-21.07-windows" | Out-Null
          $7zSystem = "C:\Program Files\7-Zip\7z.exe"
          $7zExtra = "$vcpkgDir\downloads\tools\7zip-21.07-windows\7za.exe"
          Copy-Item $7zSystem $7zExtra -Force
          Write-Host "Copied system 7zip to vcpkg downloads:"
          Get-Item $7zExtra | Select-Object Name,Length
      - name: Build plugin
        shell: cmd
        working-directory: CI\grpc
        env:
          CLEAN_OBS: 0
          CLEAN_VCPKG: 0
          VCPKG_USE_SYSTEM_BINARIES: 1
        run: python win_install_script.py
      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Closed_Captions_Plugin_Windows_gRPC_PATCHED
          path: CI\grpc\CI_build\release\
          if-no-files-found: warn
          retention-days: 90
      - name: Upload build logs on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-logs
          path: |
            CI\grpc\CI_build\build\**\*.log
            CI\grpc\CI_build\build_deps\vcpkg\buildtrees\**\*.log
          retention-days: 30
