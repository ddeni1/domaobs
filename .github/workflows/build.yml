name: Build Plugin (gRPC)
on:
  push:
    branches: [ "**" ]
  workflow_dispatch:
jobs:
  build-windows-grpc:
    runs-on: windows-2022
    timeout-minutes: 360
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Cache OBS Studio dependencies
        uses: actions/cache@v4
        with:
          key: "obs-studio-30.0.0-${{ runner.os }}-grpc-v4"
          path: CI\grpc\CI_build\build_deps\obs-studio
      - name: Cache vcpkg/gRPC build
        uses: actions/cache@v4
        with:
          key: "vcpkg-grpc-1.51-${{ runner.os }}-v4"
          path: |
            CI\grpc\CI_build\build_deps\vcpkg
            CI\grpc\CI_build\build_deps\googleapis
      - name: Pre-download 7zip 21.07 from mirrors
        shell: pwsh
        working-directory: CI\grpc
        run: |
          $downloadsDir = "CI_build\build_deps\vcpkg\downloads"
          New-Item -ItemType Directory -Force -Path $downloadsDir | Out-Null
          $target = Join-Path $downloadsDir "7z2107-extra.7z"
          if (Test-Path $target) {
            Write-Host "7zip already present (from cache)"
            exit 0
          }
          $mirrors = @(
            "https://d2.7-zip.org/a/7z2107-extra.7z",
            "https://web.archive.org/web/2022/https://www.7-zip.org/a/7z2107-extra.7z",
            "https://github.com/develar/7zip-bin/raw/master/win/x64/7za.exe"
          )
          $success = $false
          foreach ($url in $mirrors) {
            try {
              Write-Host "Trying: $url"
              Invoke-WebRequest -Uri $url -OutFile $target -UserAgent "Mozilla/5.0" -ErrorAction Stop
              $size = (Get-Item $target).Length
              if ($size -lt 100000) {
                Write-Host "File too small ($size bytes), probably HTML error page. Removing."
                Remove-Item $target
                continue
              }
              Write-Host "Downloaded successfully: $size bytes"
              $success = $true
              break
            } catch {
              Write-Host "Failed: $_"
            }
          }
          if (-not $success) {
            Write-Host "All mirrors failed. Will continue and see if vcpkg can find another way."
          }
      - name: Build plugin
        shell: cmd
        working-directory: CI\grpc
        env:
          CLEAN_OBS: 0
          CLEAN_VCPKG: 0
        run: python win_install_script.py
      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Closed_Captions_Plugin_Windows_gRPC_PATCHED
          path: CI\grpc\CI_build\release\
          if-no-files-found: warn
          retention-days: 90
      - name: Upload build logs on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-logs
          path: |
            CI\grpc\CI_build\build\**\*.log
            CI\grpc\CI_build\build_deps\vcpkg\buildtrees\**\*.log
          retention-days: 30
